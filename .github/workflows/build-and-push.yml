name: build-and-push

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: pinokew/koha
  KOHA_VERSION: "25.05"
  LOCAL_SCAN_IMAGE: local/koha-scan:${{ github.sha }}
  HADOLINT_IMAGE: hadolint/hadolint@sha256:84c2f9088a8cb0ea2bd16b5349186770d16441e77eec1a1d1e0574cf7dff47ac
  SHELLCHECK_IMAGE: koalaman/shellcheck@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d
  GITLEAKS_IMAGE: zricethezav/gitleaks@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9
  TRIVY_IMAGE: aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa

jobs:
  ci-checks:
    name: ci-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - &checkout_step
        name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Gitleaks
        run: |
          set -euo pipefail
          args=(detect --source /work --no-banner --redact --exit-code 1)
          if [ -f "$PWD/.gitleaks.toml" ]; then
            args+=(--config /work/.gitleaks.toml)
          else
            echo "No .gitleaks.toml found, running with built-in Gitleaks config"
          fi
          docker run --rm -v "$PWD:/work" -w /work "${GITLEAKS_IMAGE}" "${args[@]}"

      - name: Hadolint
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name 'Dockerfile' | sort)
          [ "${#files[@]}" -gt 0 ] || { echo "No Dockerfiles found"; exit 1; }
          docker run --rm -v "$PWD:/work" -w /work "${HADOLINT_IMAGE}" hadolint "${files[@]}"

      - name: Shellcheck
        run: |
          set -euo pipefail
          mapfile -t files < <(find scripts -type f -name '*.sh' | sort)
          [ "${#files[@]}" -gt 0 ] || { echo "No shell scripts found under scripts/"; exit 1; }
          docker run --rm -v "$PWD:/work" -w /work "${SHELLCHECK_IMAGE}" -x "${files[@]}"

      - name: Local secrets hygiene checks
        run: bash ./scripts/check-secrets-hygiene.sh

      - name: Internal ports policy check
        run: bash ./scripts/check-internal-ports-policy.sh

      - name: Trivy config
        id: trivy_config
        continue-on-error: true
        run: |
          set -euo pipefail
          log_file="trivy-config.log"
          set +e
          docker run --rm -v "$PWD:/work" -w /work "${TRIVY_IMAGE}" config --skip-check-update --ignorefile /work/.trivyignore --exit-code 1 --severity HIGH,CRITICAL /work 2>&1 | tee "${log_file}"
          trivy_rc=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${trivy_rc}" >> "${GITHUB_OUTPUT}"

      - name: Trivy config log tail
        if: always()
        run: |
          set -euo pipefail
          if [ -f trivy-config.log ]; then
            echo "----- trivy-config.log (tail -200) -----"
            tail -n 200 trivy-config.log
          else
            echo "trivy-config.log not found"
          fi

      - name: Fail on Trivy config
        if: steps.trivy_config.outputs.exit_code != '0'
        run: |
          echo "Trivy config failed with exit code ${{ steps.trivy_config.outputs.exit_code }}"
          exit 1

  build-and-publish:
    name: build-and-publish
    needs: ci-checks
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.repository_owner == 'pinokew'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - *checkout_step

      - name: Validate Docker Hub secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Missing GitHub secret: DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing GitHub secret: DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for Trivy scan (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          build-args: |
            KOHA_VERSION=${{ env.KOHA_VERSION }}
          tags: ${{ env.LOCAL_SCAN_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "${TRIVY_IMAGE}" image \
            --skip-check-update \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            "${LOCAL_SCAN_IMAGE}"

      - name: Build and push Docker image
        id: push_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            KOHA_VERSION=${{ env.KOHA_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.KOHA_VERSION }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ github.sha }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ github.sha }}
          path: sbom-${{ github.sha }}.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: docker.io/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push_image.outputs.digest }}
          push-to-registry: true
